<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ТехБезопасность</title>
    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location));
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <style>
      body { background: #f1f5f9; }
      .nav-tab-btn { border: none; background: none; border-bottom: 3px solid transparent; padding: .75rem 1.25rem; color: #6c757d; font-weight: 500; cursor: pointer; }
      .nav-tab-btn.active { color: #0d6efd; border-bottom-color: #0d6efd; font-weight: 700; }
      .opt-btn { display: flex; align-items: center; gap: .6rem; width: 100%; text-align: left; background: #fff; border: 2px solid #dee2e6; border-radius: .5rem; padding: .65rem 1rem; cursor: pointer; transition: all .15s; color: #344; }
      .opt-btn:hover { border-color: #0d6efd; background: #f0f6ff; }
      .opt-btn.selected { border-color: #0d6efd; background: #e7f1ff; color: #0d6efd; font-weight: 600; }
      .opt-letter { width: 28px; height: 28px; border-radius: 6px; background: #f1f5f9; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .82rem; flex-shrink: 0; }
      .correct-toggle { width: 34px; height: 34px; border-radius: 8px; border: 2px solid #dee2e6; background: #f8f9fa; cursor: pointer; font-weight: 700; font-size: .85rem; flex-shrink: 0; color: #adb5bd; }
      .correct-toggle.on { background: #d1e7dd; border-color: #198754; color: #198754; }
      .top-rank { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .85rem; flex-shrink: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
